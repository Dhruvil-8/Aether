name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Build Binaries
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="dist/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${BIN_DIR}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          for cmd in aether aetherd aether-web; do
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" -o "${BIN_DIR}/${cmd}${EXT}" "./cmd/${cmd}"
          done
      - name: Package Artifact
        shell: bash
        run: |
          set -euo pipefail
          NAME="aether_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${NAME}.zip" "${{ matrix.goos }}_${{ matrix.goarch }}")
          else
            tar -C dist -czf "dist/${NAME}.tar.gz" "${{ matrix.goos }}_${{ matrix.goarch }}"
          fi
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/aether_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum aether_* > SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aether_*
            dist/SHA256SUMS
